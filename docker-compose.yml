services:
  api:
    build:
      context: ./apps/api
    container_name: aclyro-api
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=aclyro
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=aclyro
      - POSTGRES_USER=aclyro
      - POSTGRES_PASSWORD=aclyro
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: aclyro-postgres
    environment:
      - POSTGRES_DB=aclyro
      - POSTGRES_USER=aclyro
      - POSTGRES_PASSWORD=aclyro
    ports:
      - "5432:5432"
    volumes:
      - aclyro_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: aclyro-redis
    ports:
      - "6379:6379"

volumes:
  aclyro_postgres_data:
